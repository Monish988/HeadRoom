services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  headroom:
    build: .
    ports:
      - "8000:8000"
    environment:
      HEADROOM_REDIS_URL: redis://redis:6379/0
      HEADROOM_LOG_LEVEL: info
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
